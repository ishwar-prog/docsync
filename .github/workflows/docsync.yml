# .github/workflows/docsync.yml
#
# This is the workflow file that users copy into their repositories.
# It instructs GitHub Actions to run DocSync on every PR and push.
#
# SETUP INSTRUCTIONS FOR USERS:
# 1. Copy this file to .github/workflows/docsync.yml in your repo
# 2. Add your AI API key as a repository secret:
#    - Go to repo Settings → Secrets and variables → Actions
#    - Add secret named GROQ_API_KEY (get free key at console.groq.com)
# 3. Run `npx @ishwarrr/docsync init` locally to create your baseline snapshot
# 4. Commit the .docsync/snapshot.json file
# That's it — DocSync runs automatically on every PR.

name: DocSync — Documentation Drift Detection

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main
      - master

  push:
    branches:
      - main
      - master

permissions:
  contents: write
  pull-requests: write

jobs:
  docsync:
    name: Documentation Drift Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout base branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.pull_request.base.sha || github.sha }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run DocSync
        uses: ./
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          groq-api-key: ${{ secrets.GROQ_API_KEY }}
          drift-threshold: '75'
          open-companion-pr: 'true'
          post-comment: 'true'
        id: docsync

      - name: Report drift status
        if: always()
        run: |
          echo "Drift Score: ${{ steps.docsync.outputs.drift-score }}/100"
          echo "Drift Detected: ${{ steps.docsync.outputs.drift-detected }}"
          echo "Files Analyzed: ${{ steps.docsync.outputs.files-analyzed }}"
          if [ "${{ steps.docsync.outputs.companion-pr-url }}" != "" ]; then
            echo "Companion PR: ${{ steps.docsync.outputs.companion-pr-url }}"
          fi